# --------------------------------
# HYDRA clustering configuration
# --------------------------------
# Usage:
#   Used by the clustering module to configure the semi-supervised
#   clustering pipeline (sklearn stand-in for demo; MATLAB HYDRA
#   for real analyses).

# Random seed for reproducibility.
seed: 42

# ── Clustering parameters ──
n_clusters: 3              # Number of patient subtypes to discover
k_range: [2, 3, 4, 5, 6, 7]  # Range of k values for model selection
n_folds: 5                 # Cross-validation folds for ARI evaluation
covariate_correction: true # Regress out covariates before clustering

# ── Permutation test ──
n_permutations: 100        # Number of permutations for stability test

# ── MATLAB HYDRA (real analyses only) ──
# These parameters are used when invoking the MATLAB implementation
# on HPC. They are ignored by the sklearn stand-in.
matlab:
  k_max: 15
  n_folds: 10
  regularization: 1.0

# ── Input/output paths (overridden by CLI/pipeline) ──
input_dir: artifacts/synthetic
output_dir: artifacts/clustering
